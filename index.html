<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rev Server OCR GitHub版</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;background:#f6f7f9;color:#111827}
    header{background:#111827;color:white;padding:14px 16px;font-weight:700}
    main{padding:14px;max-width:1100px;margin:auto}
    .card{background:white;border-radius:14px;padding:14px;margin:12px 0;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    textarea,input,select,button{font-size:16px;border-radius:10px;border:1px solid #d1d5db;padding:10px;box-sizing:border-box}
    textarea{width:100%;min-height:150px;font-family:ui-monospace,Consolas,monospace}
    button{background:#2563eb;color:white;border:none;font-weight:700;margin:4px 4px 4px 0}
    button.secondary{background:#4b5563}.ok{color:#059669;font-weight:700}.ng{color:#dc2626;font-weight:700}
    table{width:100%;border-collapse:collapse;background:white;font-size:14px}th,td{border:1px solid #e5e7eb;padding:7px;text-align:left}th{background:#f3f4f6}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}.small{font-size:13px;color:#4b5563}
  </style>
</head>
<body>
<header>Rev Server OCR GitHub連携版</header>
<main>
  <div class="card">
    <b>API確認</b><br>
    <button onclick="checkHealth()">/api/health確認</button>
    <span id="health">未確認</span>
    <div class="small">成功表示：{"ok":true,"functions":true}</div>
  </div>

  <div class="card">
    <b>サーバーOCR → 自動反映</b><br>
    <input id="file" type="file" accept="image/*" multiple />
    <button onclick="serverOCR()">サーバーOCR実行</button>
    <button class="secondary" onclick="autoApplyText()">貼付内容を自動判定→反映</button>
    <p id="status" class="small"></p>
    <textarea id="ocrText" placeholder="OCR結果、またはChatGPT読み取り結果を貼り付け"></textarea>
  </div>

  <div class="card">
    <b>レース情報検索</b>
    <div class="grid">
      <input id="sPlace" placeholder="開催地 例: 東京" />
      <input id="sGrade" placeholder="グレード 例: 1勝" />
      <input id="sSurface" placeholder="馬場 例: 芝" />
      <input id="sRule" placeholder="予想ルール" />
    </div>
  </div>

  <div class="card">
    <b>出馬表</b>
    <table id="raceTable">
      <thead><tr><th>印</th><th>枠</th><th>馬番</th><th>馬名</th><th>前走</th><th>前2走</th><th>前3走</th><th>単勝</th><th>人気</th><th>着順</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
