<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>REV OCR App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      font-size: 20px;
    }
    button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      font-size: 16px;
    }
    textarea {
      width: 100%;
      height: 150px;
      margin-top: 10px;
    }
    .box {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>REV OCR テスト</h1>

<div class="box">
  <button onclick="checkHealth()">API接続確認</button>
  <button onclick="runOCR()">OCRテスト</button>
  <textarea id="result" placeholder="結果がここに出ます"></textarea>
</div>

<script>
async function checkHealth() {
  const res = await fetch("/api/health");
  const data = await res.json();
  document.getElementById("result").value = JSON.stringify(data, null, 2);
}

async function runOCR() {
  const res = await fetch("/api/ocr", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      text: "テストデータ"
    })
  });
  const data = await res.json();
  document.getElementById("result").value = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
